name: Update Scholar Citations

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  update-citations:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh Google Scholar citations
        run: |
          python3 scripts/update_scholar_citations.py \
            --config data/scholar_publications.json \
            --output data/scholar_citations.json

      - name: Commit updated citation data
        run: |
          if git diff --quiet --exit-code data/scholar_citations.json; then
            echo "No citation changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scholar_citations.json
          git commit -m "chore: update Google Scholar citations"
          git push
